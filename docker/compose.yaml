#
services:
  app:
    build:
      context: ..
      dockerfile: Docker/Dockerfile
      args:
        # Uncomment and set to your host UID so files written into the
        # bind-mounted volume below aren't owned by a foreign UID:
        # UID: "1000"
        UID: "10001"
    volumes:
      - ..:/app
    working_dir: /app

    shm_size: "2gb"
    environment:
    tility").
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      
      - PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True
    deploy:
      resources:
        reservations:
          devices:

            - driver: nvidia

              count: all
              capabilities: [gpu]


